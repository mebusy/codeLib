            const loader = new THREE.GLTFLoader();

            var camera ; 

            const objs = [];

            loader.load( 'http://localhost:8000/test.gltf', function ( gltf ) {
                        
                        for ( k in gltf  ) {
                            console.log( k , typeof( gltf[k] ) );
                        }
                        // console.log( gltf.cameras[0]  ) ;
                        camera = gltf.cameras[0] ;
                        scene.add( gltf.scene );

                        console.log(  gltf );

                        // walk through all animations 
                        // find which object they belong to 
                        const dict_objname_anim = {}
                        for (const anim of gltf.animations) {
                            // console.log( anim.tracks[0].name.split('.')[0] );
                            const obj_name = anim.tracks[0].name.split('.')[0];
                            dict_objname_anim[ obj_name ] = anim ;
                        }

                        for ( const obj of gltf.scene.children ) {
                            if ( obj.type == "Mesh"  ) {
                                // mesh is a THREE.Group (THREE.Object3D)   
                                const mesh = obj ;
                                // find anim by mesh name 
                                const anim = dict_objname_anim[ mesh.name] ;   
                                if ( anim ) {
                                    const mixer = new THREE.AnimationMixer( mesh );
                                    objs.push( mixer ); 
                                    mixer.clipAction(anim).play();
                                    console.log( "add anim:" , anim.name , "to" , mesh.name  );
                                }

                            }
                        }
                        
                        animate();



                    }, undefined, function ( error ) {

                        console.error( error );

                    } );
        var clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            // animation with THREE.AnimationMixer.update(timedelta)                
            for ( const mixer of objs) {
                mixer.update(clock.getDelta());
            }
            renderer.render(scene, camera);
        }
