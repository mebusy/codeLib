
#user  nobody;
worker_processes  1;

error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;

    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  logs/access.log ;# main;

    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    #gzip  on;

# 设置默认 lua 搜索路径，添加 lua 路径
lua_package_path '/Volumes/WORK/WORK/mebusy_git_codeLib/ngx_lua2/lua/?.lua;;';

# 对于开发研究，可以对代码 cache 进行关闭，这样不必每次都重新加载 nginx。
lua_code_cache off;

    server {
        listen       8080;
        server_name  localhost;
        add_header Accept-Ranges bytes; # 断点下载

        #charset koi8-r;

        #access_log  logs/host.access.log  main;

        location / {
            default_type text/html;

            #content_by_lua_block {
            #   ngx.say( "8080 ") ;
            #}
            root html ;
        }

location /test {

    #content_by_lua_file lua/test.lua;


    content_by_lua_block {
        local m = require( "test" )
    }
}

location /test2 {
    rewrite_by_lua_block {
        return ngx.redirect('http://127.0.0.1:8080/test' , ngx.HTTP_MOVED_PERMANENTLY ); 
    }
}

location /test3 {
    content_by_lua_block {
        ngx.say(string.rep("hello", 1000))
        ngx.sleep(3)
        ngx.say("the world")
    }
}

